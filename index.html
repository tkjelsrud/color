<html>
  <head>
    <style>
      body {
        margin: 24px;
        font-family: sans-serif;
        background: #f5f3ee;
        color: #222;
      }

      h1, h2 {
        margin-bottom: 8px;
      }

      .family {
        margin-bottom: 32px;
      }

      .family-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }

      .palette {
        width: 280px;
        border: 1px solid #d5d0c8;
        background: white;
        padding: 12px;
        box-sizing: border-box;
      }

      .palette-title {
        font-weight: bold;
      }

      .palette-meta {
        font-size: 12px;
        color: #666;
        margin: 4px 0 10px;
      }

      .swatch-row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .swatch {
        width: 100%;
        height: 36px;
        border: 1px solid rgba(0, 0, 0, 0.12);
      }

      .token {
        font-family: monospace;
        font-size: 12px;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Color</h1>
    <div id="app">Loading palettes...</div>

    <script>
      async function start() {
        const response = await fetch('./palettes/sketch-palettes.json');
        const data = await response.json();
        const palettes = data.palettes || [];
        const families = [...new Set(palettes.map((palette) => palette.family || 'custom'))];
        const app = document.getElementById('app');
        app.innerHTML = '';

        families.forEach((family) => {
          const section = document.createElement('section');
          section.className = 'family';

          const title = document.createElement('h2');
          title.textContent = family;
          section.appendChild(title);

          const grid = document.createElement('div');
          grid.className = 'family-grid';

          palettes.filter((palette) => (palette.family || 'custom') === family).forEach((palette) => {
            const card = document.createElement('div');
            card.className = 'palette';

            const heading = document.createElement('div');
            heading.className = 'palette-title';
            heading.textContent = palette.name;
            card.appendChild(heading);

            const meta = document.createElement('div');
            meta.className = 'palette-meta';
            meta.textContent = `${palette.fills.length} fills`;
            card.appendChild(meta);

            const ink = document.createElement('div');
            ink.className = 'token';
            ink.textContent = `ink ${palette.ink}`;
            card.appendChild(ink);

            const paper = document.createElement('div');
            paper.className = 'token';
            paper.textContent = `paper ${palette.paper}`;
            card.appendChild(paper);

            const row = document.createElement('div');
            row.className = 'swatch-row';
            palette.fills.forEach((color) => {
              const swatch = document.createElement('div');
              swatch.className = 'swatch';
              swatch.title = color;
              swatch.style.background = color;
              row.appendChild(swatch);
            });
            card.appendChild(row);

            grid.appendChild(card);
          });

          section.appendChild(grid);
          app.appendChild(section);
        });
      }

      start();
    </script>
  </body>
</html>
